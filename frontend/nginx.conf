server {
    listen 80;
    server_name _;
    client_max_body_size 120M;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
    }
    location /health {
        proxy_pass http://backend:8000;
    }
    location / {
        try_files $uri /index.html;
    }
}
