<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FormuDoc Converter — PDF to Word with math</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
    /* FormuDoc: in-app "Copy text" button (vanilla, no bundle change). */
    (function(){
      var CUR=null, origFetch=window.fetch;
      window.fetch=function(){
        var p=origFetch.apply(this, arguments);
        try{
          var a0=arguments[0], url=(typeof a0==='string')?a0:((a0&&a0.url)||'');
          var m=url.match(/\/api\/jobs\/([A-Za-z0-9]+)/);
          if(m){ p.then(function(res){ try{ res.clone().json().then(function(j){ if(j&&j.status==='done') CUR=m[1]; }).catch(function(){}); }catch(e){} }); }
        }catch(e){}
        return p;
      };
      function addBtn(){
        if(document.getElementById('fd-copy-btn')) return;
        var b=document.createElement('button');
        b.id='fd-copy-btn'; b.type='button'; b.textContent='\uD83D\uDCCB Copy text';
        b.style.cssText='position:fixed;bottom:20px;right:20px;z-index:99999;padding:10px 16px;border:none;border-radius:10px;background:#6d5efc;color:#fff;font:600 14px system-ui,sans-serif;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.25)';
        b.onclick=function(){
          if(!CUR){ b.textContent='\u23F3 Ch\u01B0a c\u00F3 b\u1EA3n ho\u00E0n t\u1EA5t'; setTimeout(function(){b.textContent='\uD83D\uDCCB Copy text';},1500); return; }
          origFetch('/api/markdown/'+CUR).then(function(r){ if(!r.ok) throw new Error(r.status); return r.text(); })
            .then(function(t){ return navigator.clipboard.writeText(t); })
            .then(function(){ b.textContent='\u2713 \u0110\u00E3 copy!'; setTimeout(function(){b.textContent='\uD83D\uDCCB Copy text';},1500); })
            .catch(function(){ b.textContent='\u26A0 L\u1ED7i copy'; setTimeout(function(){b.textContent='\uD83D\uDCCB Copy text';},2000); });
        };
        document.body.appendChild(b);
        var e=document.createElement('button');
        e.id='fd-xlsx-btn'; e.type='button'; e.textContent='\u2B07 Excel';
        e.style.cssText='position:fixed;bottom:20px;right:150px;z-index:99999;padding:10px 16px;border:none;border-radius:10px;background:#1f9d55;color:#fff;font:600 14px system-ui,sans-serif;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.25)';
        e.onclick=function(){ if(!CUR){ e.textContent='\u23F3 Ch\u01B0a xong'; setTimeout(function(){e.textContent='\u2B07 Excel';},1500); return; } window.location='/api/download-xlsx/'+CUR; };
        document.body.appendChild(e);
      }
      if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', addBtn); else addBtn();
    })();
    </script>
  </body>
</html>
