<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FormuDoc Converter — PDF to Word with math</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
    /* FormuDoc: adds Download .xlsx + Copy text next to the Word download (vanilla). */
    (function(){
      var CUR=null, origFetch=window.fetch;
      window.fetch=function(){
        var p=origFetch.apply(this, arguments);
        try{
          var a0=arguments[0], url=(typeof a0==='string')?a0:((a0&&a0.url)||'');
          var m=url.match(/\/api\/jobs\/([A-Za-z0-9]+)/);
          if(m){ p.then(function(res){ try{ res.clone().json().then(function(j){ if(j&&j.status==='done') CUR=m[1]; }).catch(function(){}); }catch(e){} }); }
        }catch(e){}
        return p;
      };
      function byText(re){ var bs=document.querySelectorAll('button,a'); for(var i=0;i<bs.length;i++){ if(re.test(bs[i].textContent||'')) return bs[i]; } return null; }
      function ensureXlsxDl(){
        var d=byText(/download\s*\.docx/i); if(!d || document.getElementById('fd-xlsx-dl')) return;
        var x=document.createElement('button'); x.id='fd-xlsx-dl'; x.type='button'; x.textContent='\u2B07 Download .xlsx';
        x.style.cssText='margin-left:10px;padding:12px 18px;border:none;border-radius:10px;background:#1f9d55;color:#fff;font:600 15px system-ui,sans-serif;cursor:pointer';
        x.onclick=function(){ if(CUR){ window.location='/api/download-xlsx/'+CUR; } };
        d.parentNode.insertBefore(x, d.nextSibling);
      }
      function ensureCopy(){
        var d=byText(/download\s*\.docx/i); if(!d || document.getElementById('fd-copy-btn')) return;
        var b=document.createElement('button'); b.id='fd-copy-btn'; b.type='button'; b.textContent='\uD83D\uDCCB Copy text';
        b.style.cssText='margin-left:10px;padding:12px 18px;border:none;border-radius:10px;background:#6d5efc;color:#fff;font:600 15px system-ui,sans-serif;cursor:pointer';
        b.onclick=function(){ if(!CUR) return; origFetch('/api/markdown/'+CUR).then(function(r){ if(!r.ok) throw 0; return r.text(); }).then(function(t){ return navigator.clipboard.writeText(t); }).then(function(){ b.textContent='\u2713 \u0110\u00E3 copy'; setTimeout(function(){b.textContent='\uD83D\uDCCB Copy text';},1500); }).catch(function(){ b.textContent='\u26A0 L\u1ED7i'; setTimeout(function(){b.textContent='\uD83D\uDCCB Copy text';},1500); }); };
        d.parentNode.insertBefore(b, d.nextSibling);
      }
      var pend=false;
      function tick(){ pend=false; try{ ensureXlsxDl(); ensureCopy(); }catch(e){} }
      function schedule(){ if(pend) return; pend=true; setTimeout(tick,250); }
      if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',tick); else tick();
      new MutationObserver(schedule).observe(document.documentElement,{childList:true,subtree:true});
    })();
    </script>
  </body>
</html>
