services:
  backend:
    build: ./backend
    container_name: formudoc-backend
    ports:
      - "8000:8000"
    volumes:
      - formudoc-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: formudoc-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  formudoc-data:
